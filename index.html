<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Queeniee 👑💖</title>

<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(-45deg,#ff4d6d,#ff8fab,#ffc2d1,#ffd6e0,#fbc2eb);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.sparkle{
  position:absolute;
  width:5px;
  height:5px;
  border-radius:50%;
  background:gold;
  box-shadow:0 0 12px gold;
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-10vh);opacity:1;}
  to{transform:translateY(110vh);opacity:0;}
}

.heart{
  position:absolute;
  font-size:18px;
  animation:rise linear infinite;
}

@keyframes rise{
  from{transform:translateY(100vh) scale(.7);opacity:1;}
  to{transform:translateY(-10vh) scale(1.3);opacity:0;}
}

.card{
  position:relative;
  z-index:2;
  width:92%;
  max-width:430px;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(12px);
  border-radius:28px;
  padding:35px 24px;
  text-align:center;
  box-shadow:0 20px 45px rgba(0,0,0,.25);
}

h1{
  font-family:'Sacramento',cursive;
  font-size:3.2em;
  color:#fff;
  margin-bottom:8px;
}

.sub{
  color:#fff;
  line-height:1.6;
  margin-bottom:22px;
}

.btn-wrap{
  display:grid;
  gap:10px;
}

button{
  border:none;
  cursor:pointer;
  padding:14px 20px;
  border-radius:50px;
  background:#ff4d88;
  color:#fff;
  font-size:1em;
}

.music{
  background:#9b5de5;
}

.envelope{
  width:90px;
  height:60px;
  background:#fff;
  margin:0 auto 18px;
  position:relative;
  border-radius:8px;
  animation:floaty 2.5s ease-in-out infinite;
}

@keyframes floaty{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

.envelope:before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:0;
  height:0;
  border-left:45px solid transparent;
  border-right:45px solid transparent;
  border-top:30px solid #ffd6e0;
}

.envelope:after{
  content:'💌';
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  top:8px;
}

/* POPUPS */
.popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(8px);
  justify-content:center;
  align-items:center;
  z-index:10;
  padding:15px;
}

.popup-box{
  width:100%;
  max-width:430px;
  max-height:88vh;
  overflow-y:auto;
  background:white;
  border-radius:24px;
  padding:28px 22px;
  text-align:center;
  box-shadow:0 0 25px rgba(255,105,180,.45);
}

.popup-box h2{
  font-family:'Sacramento',cursive;
  font-size:2.4em;
  color:#ff4d88;
  margin-bottom:12px;
}

.textBox{
  white-space:pre-line;
  color:#333;
  line-height:1.7;
  min-height:220px;
}

.nextBtn{
  margin-top:15px;
  background:#ff6fa6;
}

.burst{
  position:absolute;
  font-size:20px;
  animation:burst 1.2s forwards;
}

@keyframes burst{
  from{transform:translate(0,0) scale(.5);opacity:1;}
  to{transform:translate(var(--x),var(--y)) scale(1.6);opacity:0;}
}
</style>
</head>

<body>

<!-- UPDATED BACKGROUND MUSIC -->
<audio id="bgMusic" loop>
    <source src="https://raw.githubusercontent.com/ank0809/Something_4_u/d7e9ab331498b6b213684411eb3bdfa28ad83078/Jeene%20Laga%20Hoon%20Ramaiya%20Vastavaiya%20320%20Kbps%20(mp3cut.net)%20(1).mp3" type="audio/mpeg">
</audio>

<div class="card">

<div class="envelope"></div>

<h1>Hello Wifeyy(my queenieee) 👑</h1>

<p class="sub">
Some people enter life...<br>
and turn everything into magic ✨<br>
You did that to mine 💖
</p>

<div class="btn-wrap">
<button onclick="openPopup1()">Your Eyes 👀</button>
<button onclick="toggleMusic()" class="music">Music 🎵</button>
</div>

</div>

<!-- POPUP 1 -->
<div class="popup" id="popup1">
<div class="popup-box">
<h2>Your Eyes 👀</h2>
<div class="textBox" id="text1"></div>
<button class="nextBtn" onclick="goToPopup2()">Next ➜</button>
</div>
</div>

<!-- POPUP 2 -->
<div class="popup" id="popup2">
<div class="popup-box">
<h2>Your Beauty 🌸</h2>
<div class="textBox" id="text2"></div>
<button class="nextBtn" onclick="goToPopup3()">Next ➜</button>
</div>
</div>

<!-- POPUP 3 -->
<div class="popup" id="popup3">
<div class="popup-box">
<h2>My Heart 💖</h2>
<div class="textBox" id="text3"></div>
<button class="nextBtn" onclick="closeAll()">Always Yours 💖</button>
</div>
</div>

<script>
const music=document.getElementById("bgMusic");

/* Auto play on first touch */
window.onload=()=>{
music.play().catch(()=>{
document.body.addEventListener("click",()=>{
music.play();
},{once:true});
});
};

function toggleMusic(){
if(music.paused){music.play();}
else{music.pause();}
}

const msg1=[
"Your eyes...",
"",
"They hold peace",
"that no place can give me.",
"",
"One look from you,",
"and my whole day becomes softer.",
"",
"Stars borrowed",
"their shine from them ✨"
];

const msg2=[
"Your smile...",
"",
"It feels like sunshine",
"after the longest rain.",
"",
"Your expressions,",
"your laugh,",
"your little reactions...",
"",
"Everything about you",
"is beautiful 🌸"
];

const msg3=[
"You are so important to me...",
"",
"Since you came into my life,",
"normal days became special.",
"",
"You make sadness lighter,",
"and happiness deeper.",
"",
"I feel lucky to have you 👑💖"
];

function openPopup1(){
document.getElementById("popup1").style.display="flex";
typeLines("text1",msg1);
heartExplosion();
}

function goToPopup2(){
document.getElementById("popup1").style.display="none";
document.getElementById("popup2").style.display="flex";
typeLines("text2",msg2);
heartExplosion();
}

function goToPopup3(){
document.getElementById("popup2").style.display="none";
document.getElementById("popup3").style.display="flex";
typeLines("text3",msg3);
heartExplosion();
}

function closeAll(){
document.getElementById("popup3").style.display="none";
}

function typeLines(id,arr){
const box=document.getElementById(id);
box.innerHTML="";
let i=0;

function nextLine(){
if(i>=arr.length)return;

const div=document.createElement("div");
box.appendChild(div);

let txt=arr[i];
let j=0;

const timer=setInterval(()=>{
if(j<txt.length){
div.textContent+=txt.charAt(j);
j++;
}else{
clearInterval(timer);
i++;
setTimeout(nextLine,220);
}
},28);
}

nextLine();
}

setInterval(()=>{
const h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(4+Math.random()*3)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),7000);
},450);

setInterval(()=>{
const s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(s);
setTimeout(()=>s.remove(),10000);
},350);

function heartExplosion(){
for(let i=0;i<18;i++){
const b=document.createElement("div");
b.className="burst";
b.innerHTML="💖";
b.style.left="50%";
b.style.top="50%";
b.style.setProperty("--x",(Math.random()*300-150)+"px");
b.style.setProperty("--y",(Math.random()*300-150)+"px");
document.body.appendChild(b);
setTimeout(()=>b.remove(),1200);
}
}
</script>

</body>
</html>
