<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Royal Princess 👑💖</title>

<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(-45deg,#ff4d6d,#ff8fab,#ffc2d1,#ffd6e0,#fbc2eb);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Golden sparkles */
.sparkle{
  position:absolute;
  width:5px;
  height:5px;
  border-radius:50%;
  background:gold;
  box-shadow:0 0 12px gold;
  animation:fall linear infinite;
  z-index:0;
}

@keyframes fall{
  from{transform:translateY(-10vh);opacity:1;}
  to{transform:translateY(110vh);opacity:0;}
}

/* Floating hearts */
.heart{
  position:absolute;
  font-size:18px;
  animation:rise linear infinite;
  z-index:0;
}

@keyframes rise{
  from{transform:translateY(100vh) scale(.7);opacity:1;}
  to{transform:translateY(-10vh) scale(1.3);opacity:0;}
}

.card{
  position:relative;
  z-index:2;
  width:92%;
  max-width:430px;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(12px);
  border-radius:28px;
  padding:35px 24px;
  text-align:center;
  box-shadow:0 20px 45px rgba(0,0,0,.25);
}

h1{
  font-family:'Sacramento',cursive;
  font-size:3.2em;
  color:#fff;
  margin-bottom:8px;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.05);}
}

.sub{
  color:#fff;
  line-height:1.6;
  margin-bottom:22px;
  font-size:1.02em;
}

.btn-wrap{
  display:grid;
  gap:10px;
}

button{
  border:none;
  cursor:pointer;
  padding:14px 20px;
  border-radius:50px;
  background:#ff4d88;
  color:#fff;
  font-size:1em;
  transition:.3s;
}

button:hover{
  transform:scale(1.05);
}

.music{
  background:#a855f7;
}

/* Envelope */
.envelope{
  width:90px;
  height:60px;
  background:#fff;
  margin:0 auto 18px;
  position:relative;
  border-radius:8px;
  animation:floaty 2.5s ease-in-out infinite;
}

@keyframes floaty{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

.envelope:before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:0;
  height:0;
  border-left:45px solid transparent;
  border-right:45px solid transparent;
  border-top:30px solid #ffd6e0;
}

.envelope:after{
  content:'💌';
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  top:8px;
}

/* Popup */
#popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(8px);
  justify-content:center;
  align-items:center;
  z-index:10;
  padding:15px;
}

.popup-box{
  width:100%;
  max-width:430px;
  max-height:88vh;
  overflow-y:auto;
  background:white;
  border-radius:24px;
  padding:28px 22px;
  text-align:center;
  box-shadow:0 0 25px rgba(255,105,180,.45);
}

.popup-box h2{
  font-family:'Sacramento',cursive;
  font-size:2.5em;
  color:#ff4d88;
  margin-bottom:10px;
}

#typedText{
  white-space:pre-line;
  color:#333;
  line-height:1.7;
  font-size:.98em;
  min-height:220px;
}

.closeBtn{
  margin-top:15px;
  background:#ff6fa6;
}

/* Heart burst */
.burst{
  position:absolute;
  font-size:20px;
  animation:burst 1.2s forwards;
  pointer-events:none;
  z-index:20;
}

@keyframes burst{
  from{
    transform:translate(0,0) scale(.5);
    opacity:1;
  }
  to{
    transform:translate(var(--x),var(--y)) scale(1.6);
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- SONG -->
<audio id="bgMusic" loop>
<source src="https://raw.githubusercontent.com/ank0809/Rose-day/db84e1f74fdef01c0b62ff2576ba8055b5e57e6e/Mere%20Naam%20Tu%20Instrumental%20Ringtone%20Download%20Pagalworld%20(mp3cut.net).mp3" type="audio/mpeg">
</audio>

<div class="card">

<div class="envelope"></div>

<h1>My Royal Princess 👑</h1>

<p class="sub">
Some people enter life...  
and turn everything into magic ✨  
You did that to mine 💖
</p>

<div class="btn-wrap">
<button onclick="openPopup(1)">Your Eyes 👀</button>
<button onclick="openPopup(2)">Your Beauty 🌸</button>
<button onclick="openPopup(3)">My Heart 💖</button>
<button class="music" onclick="toggleMusic()">Music 🎵</button>
</div>

</div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h2 id="title">For You 💌</h2>
<div id="typedText"></div>
<button class="closeBtn" onclick="closePopup()">Always Yours 💖</button>
</div>
</div>

<script>
const popup=document.getElementById("popup");
const typedText=document.getElementById("typedText");
const title=document.getElementById("title");
const music=document.getElementById("bgMusic");

document.body.addEventListener("click",()=>{
music.play().catch(()=>{});
},{once:true});

function toggleMusic(){
if(music.paused){
music.play();
}else{
music.pause();
}
}

const messages={
1:{
title:"Your Eyes 👀",
text:`Your eyes...

They hold peace
that no place can give me.

One look from you,
and my whole day becomes softer.

Sometimes I think
stars borrowed their shine from them ✨

And when you look at me...
my heart forgets everything else 💖`
},

2:{
title:"Your Beauty 🌸",
text:`Your smile...

It feels like sunshine
after the longest rain.

Your expressions,
your laugh,
your little reactions...

Everything about you
is naturally beautiful.

You are not just pretty...

You are the kind of beauty
that stays in someone's heart forever 🤍`
},

3:{
title:"My Heart 💖",
text:`You are so important to me...

Since you came into my life,
normal days became special.

You make sadness lighter,
silence warmer,
and happiness deeper.

I feel lucky to have you.

If life became beautiful suddenly...

It's because you are in it 👑💖`
}
};

function openPopup(num){
popup.style.display="flex";
typedText.textContent="";
title.textContent=messages[num].title;
startTyping(messages[num].text);
heartExplosion();
}

function closePopup(){
popup.style.display="none";
typedText.textContent="";
}

function startTyping(text){
let i=0;
const type=setInterval(()=>{
typedText.textContent+=text[i];
i++;
typedText.parentElement.scrollTop=typedText.parentElement.scrollHeight;
if(i>=text.length) clearInterval(type);
},28);
}

/* Background floating hearts */
setInterval(()=>{
const h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(4+Math.random()*3)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),7000);
},450);

/* Sparkles */
setInterval(()=>{
const s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(s);
setTimeout(()=>s.remove(),10000);
},350);

/* Hearts explosion */
function heartExplosion(){
for(let i=0;i<18;i++){
const b=document.createElement("div");
b.className="burst";
b.innerHTML="💖";
b.style.left="50%";
b.style.top="50%";
b.style.setProperty("--x",(Math.random()*300-150)+"px");
b.style.setProperty("--y",(Math.random()*300-150)+"px");
document.body.appendChild(b);
setTimeout(()=>b.remove(),1200);
}
}
</script>

</body>
</html>
