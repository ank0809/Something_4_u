<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Beautiful Girl 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.card{
  width:92%;
  max-width:430px;
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(12px);
  border-radius:28px;
  padding:35px 28px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
  animation:pop 1s ease;
  z-index:2;
}

@keyframes pop{
  from{transform:scale(.8);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

h1{
  font-family:'Sacramento',cursive;
  font-size:3.1em;
  margin-bottom:10px;
  animation:heartbeat 1.8s infinite;
}

@keyframes heartbeat{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.06);}
}

.sub{
  font-size:1.08em;
  line-height:1.6;
  margin-bottom:22px;
}

button{
  border:none;
  outline:none;
  padding:14px 28px;
  border-radius:50px;
  font-size:1em;
  cursor:pointer;
  background:#ff4d88;
  color:white;
  transition:.3s;
}

button:hover{
  transform:scale(1.08);
}

#popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(8px);
  justify-content:center;
  align-items:center;
  z-index:10;
}

.popup-box{
  width:90%;
  max-width:430px;
  background:white;
  color:#333;
  padding:30px 24px;
  border-radius:24px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,.25);
  animation:floatBox 2s ease-in-out infinite;
}

@keyframes floatBox{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

.popup-box h2{
  font-family:'Sacramento',cursive;
  font-size:2.6em;
  color:#ff4d88;
  margin-bottom:10px;
}

#typedText{
  min-height:260px;
  white-space:pre-line;
  line-height:1.7;
  font-size:1em;
}

.closeBtn{
  margin-top:15px;
  background:#ff6fa6;
}

.heart{
  position:absolute;
  font-size:20px;
  animation:rise 6s linear infinite;
  opacity:.85;
}

@keyframes rise{
  from{
    transform:translateY(100vh) scale(.7);
    opacity:1;
  }
  to{
    transform:translateY(-10vh) scale(1.3);
    opacity:0;
  }
}

.sparkle{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  background:gold;
  box-shadow:0 0 10px gold;
  animation:fall 8s linear infinite;
}

@keyframes fall{
  from{
    transform:translateY(-10vh);
    opacity:1;
  }
  to{
    transform:translateY(110vh);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="card">
  <h1>For My Favorite Person 💖</h1>
  <p class="sub">
    There are some people who make life beautiful...  
    and then there is <b>you</b> ✨
  </p>
  <button onclick="openPopup()">Open My Heart 💌</button>
</div>

<div id="popup">
  <div class="popup-box">
    <h2>About You 🤍</h2>
    <div id="typedText"></div>
    <button class="closeBtn" onclick="closePopup()">Always Yours 💖</button>
  </div>
</div>

<script>
const popup = document.getElementById("popup");
const typedText = document.getElementById("typedText");

const message =
`Your eyes...

They hold a softness
that calms every storm inside me.
One look from you,
and somehow the whole world feels lighter ✨

Your smile...

It is dangerous in the best way,
because every time you smile,
my heart forgets how to behave 🤍

Your expressions...

Even without words,
your face tells stories
I could watch forever.

And you...

You are more important to me
than I can ever explain.

You make ordinary days feel special,
silent moments feel warm,
and life feel worth smiling for.

Since you came into my life,
everything feels brighter,
gentler,
more beautiful.

I feel lucky to have you.
I feel peaceful with you.
I feel happy because of you.

If anyone asks me
what beauty looks like...

I would simply show them you 💖`;

function openPopup(){
  popup.style.display = "flex";
  startTyping();
}

function closePopup(){
  popup.style.display = "none";
  typedText.textContent = "";
}

function startTyping(){
  typedText.textContent = "";
  let i = 0;

  const type = setInterval(()=>{
    typedText.textContent += message[i];
    i++;
    if(i >= message.length){
      clearInterval(type);
    }
  },32);
}

/* floating hearts */
setInterval(()=>{
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";
  h.style.left = Math.random()*100 + "vw";
  h.style.animationDuration = (4 + Math.random()*3) + "s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),7000);
},500);

/* golden sparkles */
setInterval(()=>{
  const s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random()*100 + "vw";
  s.style.animationDuration = (5 + Math.random()*4) + "s";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),9000);
},350);
</script>

</body>
</html>
